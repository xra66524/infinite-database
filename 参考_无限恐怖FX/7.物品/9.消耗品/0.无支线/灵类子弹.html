<br>灵类子弹 250分/盒（10发） 魔幻本质
<br>
<br>属于“特殊子弹”的一种，但由于其制作十分简单，外观上仅比普通子弹多了一些符文，因此不需要承受使用特殊子弹的器械减值，也可以用于【火力压制】上，对射击技能等级无需求。
<br>
<br>效果：使用灵类子弹射击时，攻击获得【攻击灵体】特性。
<br>
<br>特殊的，无限子弹版的灵类子弹弹夹的价格是1500分或者D+0。
