<br>犀照牛渚（犀照）
<br>介绍：
<br>        朝议将留辅政，峤以导先帝所任，固辞还藩。复以京邑荒残，资用不给，峤借资蓄，具器用，而后旋于武昌。至牛渚矶，水深不可测，世云其下多怪物，峤遂毁犀角而照之。须臾，见水族覆火，奇形异状，或乘马车著赤衣者。峤其夜梦人谓己曰：「与君幽明道别，何意相照也？」
