<br>通脉丹 
<br>价格：D+500 
<br>效果： 
<br>有打通经脉之效，第一次服食选择一项东方系通用能量（如内力、仙力等，具体由ST判定），增加其20点能量上限，并且每小时进行一次该能量的关键属性判定，并恢复成功数点能量，这是一种类似自动冥想/打坐的效果，与同类效果不能同时生效，每天以此回复的能量不能超过其能量池上限。随后会增加抗药性。第二次服食再增加30点，随后不再具有增加能量上限的功效。
