<br>琉璃护心镜 D+750 特异本质 消耗品
<br>
<br>这是一面以琉璃为镜背的护心铜镜，镜背的花纹是一只麒麟。这是一位老太太私下交予即将入伍的孙子的礼物。
<br>琉璃护心镜虽然不占据装备位，但依旧需要佩戴在胸前才能生效（佩戴在衣服或盔甲之下）。
<br>琉璃护心镜有两个效果，1、2效果各只能使用一次：
<br>1、当佩戴者受到一次攻击/范围伤害，且这次所受的伤害足以使佩戴者死亡时生效，佩戴者针对这次伤害额外获得9点伤害吸收。
<br>2、当佩戴者受到一次即死类效果时，免疫这次即死类效果，这是一个S级免疫即死的能力。
<br>当琉璃护心镜的一个效果生效后，镜面将破碎，布满裂痕，当两个效果都生效后，整面镜子将完全破碎。
