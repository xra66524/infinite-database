<br>显像提灯  CD+1500
<br>
<br>魔幻本质
<br>
<br>这是一盏附盖提灯造型的永明提灯，提灯内安置了一块结合了“不灭明焰”法术的艾伯伦龙晶作为光源，可自由开关。显像提灯可为其周围10米半径范围提供常光光照，以及该范围外10米的昏暗光照，但它的火光永远不会熄灭（也不会提供温暖）。 
<br>
<br>在显像提灯的光照范围内（即半径20米的球形范围），所有不超过C级的反侦测能力都将失效，虚体、灵体或类似需要灵视才能观察的生物或物体都会显现。
<br>
<br>你可以以一个移动动作放下盖子，使其提供的光照减弱为1.5米半径范围的昏暗光照。
