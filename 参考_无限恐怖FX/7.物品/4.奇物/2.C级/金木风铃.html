<br>金木风铃 C+1000
<br>
<br>用这颗星球上独有的金含量极高的树木制作的风铃，虽然精致，但本身只是凡物。然而，由于它吸收了塔纳人灭族时的强烈思念，因此含有某种超凡力量。携带即可生效，为你的专注检定还有知识检定提供6dp器械加值。此外，如果在进行表达时手持或佩戴此风铃，那么你的这次表达判定将获得6dp器械加值。
