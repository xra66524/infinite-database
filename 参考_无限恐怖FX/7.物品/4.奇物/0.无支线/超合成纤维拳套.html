<br>超合成纤维拳套 科技本质
<br>
<br>500奖励点 
<br>
<br>军械库中少数几件没有缺陷的实用小道具之一，从外表看只是一双普通的劳工白手套。
<br>
<br>占据手套位
<br>
<br>特性：
<br>
<br>冲击吸收：一双坚韧耐用的手套可以保护你的双手。当你以手部天生武器进行格挡时额外获得1DP格挡防御，并且当你因以手部天生武器进行肉搏攻击而受到反伤时，你在面对这次反伤中获得1点物理伤害吸收。
<br>
<br>难以损坏：用这种特殊材质制造的装备难以损坏。若开放物品破坏规则，这双手套的数据可视为具有硬度6，结构值12。
