<br>炼金磨刀石
<br>
<br>价格：500
<br>
<br>效果：
<br>
<br>你需要花费十分钟时间以这件奇物打磨一件白刃武器，使其得到充分的保养。
<br>
<br>保养后的此日内，进入战斗遭遇后，使用被保养的武器所进行的第一此攻击的武器伤害视为提升2L。
<br>
<br>一枚炼金石只能同时对一件白刃武器生效。
