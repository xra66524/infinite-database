<br>霍普徽章 500 特异本质
<br>
<br>占据护符位
<br>
<br>这是一个造型为一根蓝色的羽毛徽章，徽章边缘为绿色。
<br>佩戴后，你的移动速度+5米。
<br>你能够在进行跳跃时，在跳跃过程中再进行一次跳跃（这需要你正常消耗进行跳跃的动作），这次跳跃与你上一次跳跃视为同种跳跃（直立跳、立定跳、助跑跳）。比如，你先进行一次助跑跳，然后在这次跳跃即将结束落地时，再使用一个移动动作进行一次跳跃，这次跳跃视作已助跑。
