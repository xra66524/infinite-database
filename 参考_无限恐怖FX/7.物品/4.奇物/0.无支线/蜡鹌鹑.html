<br>蜡鹌鹑 500 特异本质
<br>这是一只蜡制的鹌鹑造型的装饰，大小也和一只鹌鹑相近（远处看更像一只鸽子）。
<br>当你将其顶在头上时，你获得以下效果：
<br>当你进行助跑跳时，你的跳远距离+10米，移动速度也+10米。
<br>当你将它顶在头上时，无论是跳跃还是翻滚，它都不会从你的头上掉下来，直到你主动将其摘下来。
<br>蜡鹌鹑不占据头盔位。
