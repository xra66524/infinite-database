<br>照妖鉴 DD+1000 
<br>这是由云中子炼制的一面能照出妖魔鬼怪原形的铜镜。
<br>每回合一次，只要把它对着10米内的一个目标，镜子中的目标就会显露出原形（但是这不会让它变回原形），这是一个C级的识破变形、幻象、附体的能力（并不能使自身免疫或解除目标的变形、幻象、附体等效果），并且它还能如拥有灵感视觉一般照出灵体和虚体。 
<br>你可以补相应差价升级到C,B级（C级需要：D+0，B级需要：CC+1000），识破等级分别提高到B/S级。
