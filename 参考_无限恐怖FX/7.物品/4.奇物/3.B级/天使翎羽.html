<br>天使翎羽 B+4000 
<br>奇物・护符位・魔幻本质 
<br>天使代表着神之完美，就连最细的羽毛都盈满着美丽优雅！这是用天使的羽毛制成的护符。 
<br>每当你敏感范围内有其他人使用和消耗非黑暗系的能量时，你可以立刻将一点生命值恢复为完好。一回合内你以此方式回复的生命值不能超过你耐力值的三分之一【医疗点96】。
<br>而当你使用和消耗非黑暗系的能量时，你获得1点临时生命值，但以此获得的临时生命值最多同时拥有“你耐力值的三分之一”点，持续一场景。
<br>
<br>
<br>注：这里的“黑暗系能量”包括但不限于：妖力、血能、怨念力，生气等，具体可由ST判断。
