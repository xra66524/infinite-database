<br>伏尔甘之链 
<br>BB+4000 
<br>魔幻本质 
<br>同时占据手套位和护符位 
<br>这组铁链编织成的护颈和护腕由钢铁之手原体亲自打造，灌注有强大的魔法。佩戴者在防御上获得+14偏斜加值，并获得以下效果：
<br>能力1：在防御上获得+6附加成功的偏斜加值
<br>能力2：在强韧豁免上额外获得+6附加成功的器械加值，并且免疫S级即死的效果
<br>能力3：佩戴者额外获得伤害减免6/- 
<br>伏尔甘之链的力量与佩戴者的生命能量相连。因此，若佩戴者有超过耐力值数字的生命槽被冲击伤害填满，则能力3不再生效；若佩戴者全部的生命槽被严重伤害填满，则能力2、3皆不再生效；若佩戴者有超过耐力值数字的生命槽被恶性伤害填满，则能力1、2、3皆不再生效。
