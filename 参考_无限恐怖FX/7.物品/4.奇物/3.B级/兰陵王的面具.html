<br>兰陵王的面具 
<br>B+3500 
<br>魔幻本质 
<br>部位：头部 
<br>相传兰陵王面貌俊美如女性，无法令对手心生畏惧，遂戴此狰狞恐怖之面具。 
<br>若带的着兰陵王的面具，则任何试图改善关系的说服或交际检定都自动承受-6成功数的减值，但任何威吓检定都获得+3附加成功的表现加值。 
<br>兰陵王所向无敌的战场威仪已浸透面具，这使得佩戴者在冲锋时，攻击检定额外获得+5DP的表现加值，并且所有距离佩戴者不超过50米的、可以观察到佩戴者的盟友，在所有主动进行的检定上获得+5DP的士气加值，直到佩戴者下一回合结束。
