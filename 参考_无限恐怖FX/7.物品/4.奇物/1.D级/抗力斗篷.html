<br>
<br>价格：D+500
<br>
<br>分类：斗篷
<br>
<br>描述：
<br>抗力斗篷的能力来源于魔法，因此你可以自由的挑选斗篷、披风或者是围巾款式，无论何种造型，它都会占用你的斗篷位。
