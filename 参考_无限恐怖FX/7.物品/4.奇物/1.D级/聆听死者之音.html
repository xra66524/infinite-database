<br>聆听死者之音
<br>介绍：
<br>    聆听那黑暗中的音符吧！
<br>    那充满怨恨的话语，来自死者的歌声。
<br>    它会告诉你黑暗中存在的秘密,揭示你将面临的恐惧。
<br>分类：魔幻本质/护符
<br>价格：D+500
<br>效果：
<br>    佩戴这枚护符使，你可以听到虚体/灵体的发出声音。
<br>    无论这是它们无意中说出的言语，还是移动时的动静。
<br>    你可以借由对这些存在的声音了解黑暗中的秘密。
<br>    面对黑暗生物时，你可以选择使自身的操控属性和学识技能视为提升1点。
<br>    若已经提升到上限，则可使你自身对黑暗生物的操控、学识和洞察判定上额外获得1个基于洞察加值的附加成功。
<br>
