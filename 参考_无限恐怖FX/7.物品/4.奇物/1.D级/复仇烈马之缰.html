<br>复仇烈马之缰
<br>
<br>价格：D＋500
<br>
<br>类型：奇物
<br>
<br>描述：这是一根饱尝前任主人鲜血的缰绳，握在手上可以听到战马浴血的嘶吼。当拥有者进行冲锋时，幽灵战马将从其裆下出现并且载着主人如同幻影一般高速冲向敌人，当攻击结束幻影将再次回归缰绳中沉睡等待下一次英勇的突袭。（St：你马没了）
<br>
<br>效果：拥有者可以消耗整轮动作冲锋，这次冲锋在移动中获得额外30米移动速度和免疫C级困难地形效果，而此次攻击获得高速6。
