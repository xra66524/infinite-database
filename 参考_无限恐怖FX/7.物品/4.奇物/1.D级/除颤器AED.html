<br>除颤器AED D+500 特异本质
<br>
<br>这是一个背包大小的急救设备（体积2），可以通过电击“复活”重伤倒地的队友。
<br>
<br>以一个标准动作对一个已因伤势而昏迷的目标使用，你立即将目标身上至多4点严重伤害恢复至完好（医疗点14），在这之后，你视作对其进行了一次急救，并且这次急救检定获得+3附加成功的器械加值。
<br>
<br>需要注意的是，除颤器每天只能使用一次。
<br>
