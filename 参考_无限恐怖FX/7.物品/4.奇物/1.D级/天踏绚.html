<br>天踏绚 DD+750 魔幻本质
<br>
<br>天踏绚是四枫院家的秘宝之一，只需向其中注入灵力即可在空中自由翱翔。其样式为一件宽大的浅棕色披风，领口位置有一圈麻绳样式的束带，束带上挂着四枫院家的家徽。
<br>
<br>以迅捷动作向天踏绚中注入灵力，如同使用一个意志DC为3的灵力技能，然后在本场景中，穿戴者将视作获得一个速度等于其基本速度的飞行能力，机动性为完美。即使切换场景，你只需要再进行一次相同的意志DC注入灵力即可维持这个飞行能力。
<br>
