<br>治疗宝珠 D+500 特异本质
<br>
<br>这是一个绿色的宝珠，它散发着莹莹的绿光。宝珠中间有一个洞，可以穿过绳子，这也就意味着治疗宝珠可以挂在脖子上或者戴在手腕上。占用护符位。
<br>
<br>当你在佩戴此宝珠时，你可以选定你的一个具有医疗点的治疗能力（例如快速医疗），使其医疗点上限增加48点，选定后不可更改，并且他人佩戴时无效。
<br>
<br>花费额外的DD+500，增加医疗点上限的数值改为96点。
