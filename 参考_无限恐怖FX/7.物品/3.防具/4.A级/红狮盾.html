<br>红狮盾 
<br>A+4000
<br>此盾乃圣诞老人赠予至高王彼得之物，坚不可摧。这是一面银色的大盾，盾的中央有一个红色的狮子图案。
<br>此盾牌具有【格挡20】特性，体积为2。当不使用此盾格挡时，持用者仍然可以在防御上获得+5格挡加值。此外持有者将获得2点全能量抗力。只要持用者骄傲地将此盾展示在外，任何可以感知到盾牌的、位于同一场景的盟友（包括自身），就在所有主动进行的检定上获得+6DP士气加值。
