<br>玫瑰圆盾 C+1000 特异本质
<br>
<br>这是一面金色的圆盾，圆盾中央的颜色稍浅，并有花朵样式的图案。当你保持移动时，你的身边会出现4个环绕你移动的盾牌造型的小型金色光标，为你抵消受到的伤害。
<br>
<br>玫瑰圆盾属于大盾，武器伤害为1L，具有【格挡2】，体积2。
<br>当你手持或将玫瑰圆盾佩戴在小臂上时，你可以消耗一个移动动作进行一次移动。如果这次移动距离等同于你的基本速度（或超过，如果你可以的话），那么直到下轮你的行动轮结束前，你将获得5点全伤害吸收，该全伤害吸收不挂钩格挡防御。如果你在本轮进行了移动，但移动距离之和小于你的基本速度时，你仅在当前你的行动轮中获得这5点全伤害吸收。
