<br>银鳞胸甲
<br>介绍：
<br>　    由青铜锭(20)、绿玛瑙(2)、次级月亮石(2)、彩色珍珠(2)和银锭(4)为材料制造的胸甲。
<br>价格：C+1000
<br>效果：
<br>　　此盔甲被视为轻甲，它的盔甲防御数值为6/6，且提供额外的DR1/钝击。
<br>　　装备后，它能使主人的力量属性+2、耐久属性+1。
