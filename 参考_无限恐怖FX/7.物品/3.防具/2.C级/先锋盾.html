<br>先锋盾 
<br>
<br>C+1000 
<br>
<br>魔幻本质 
<br>
<br>这面盾牌以寒铁铸成，盾面上刻有狰狞的骷髅浮雕。 
<br>
<br>据说这是诺森德的死亡骑士们冲锋陷阵时惯用的盾牌，能够轻松挡下任何有威胁的攻击。 
<br>
<br>这是一面体积4的风筝盾（重盾），具有【格挡7】。持用者的生命上限获得+2的提升（但不会因此恢复伤势）。并且只要不松开此盾，就能获得1点快速医疗【医疗点20】。当使用此盾进行格挡时，若持用者的力量值高于攻击者的力量，该盾牌的格挡值便增加该差值的数值，但是最多不超过持用者在力量上的附加成功数+1的数值。 
<br>
