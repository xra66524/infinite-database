<br>鲛革盔甲 1000 特异本质
<br>
<br>以鲨鱼皮为主材料所制成的盔甲，经过楚国巫师的施法后不仅防御力有所提升，并且可增强穿戴者在水中的战斗力。
<br>视作轻甲，同时占用盔甲位和头盔位（头盔位置可代替），盔甲加值3/3，并具有1点偏斜防御，对抗范围伤害时豁免+1DP器械加值。
<br>穿戴者可以在水中可以用等于基本速度的速度进行如同机动性完美的飞行一样的移动，并且在水中时闪避防御+1DP。
