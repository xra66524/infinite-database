<br>优秀的坚钢之铠
<br>介绍：
<br>    有着出色防御的钢铁盔甲，它可以极大强化穿戴者对物理攻击的耐性。
<br>    对于非物理攻击时，它带来防御会显得较为脆弱。
<br>分类：重盔甲
<br>价格：D+1000
<br>效果：
<br>    这件重盔甲的盔甲防御为4/4，具有3点盔甲减值。
<br>    仅面对造成物理伤害的攻击时，它具有特别的威力；其盔甲防御上可额外得到8点增强加值，且额外获得1点物理伤害吸收。
<br>
<br>特殊的，优秀的坚钢之铠无法应用差价升级规则。
<br>
