<br>战斗装甲（重甲） D+500 
<br>
<br>科技本质
<br>
<br>灵活的高科技装甲能够隔绝子弹的伤害，内置的外骨骼系统能够提升穿戴者的力量。
<br>
<br>这视作一件盔甲防御6/6，具有【防弹】特性的重甲。穿戴者在力量上获得+1点的器械加值，但需承受-2盔甲减值。战斗装甲的头盔具有简单的红外成像和视线增强功能，穿戴者视作具有【黑暗视觉】。
<br>
