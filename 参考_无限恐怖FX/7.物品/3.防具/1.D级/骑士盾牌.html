<br>骑士盾牌 D+1000
<br>
<br>魔幻本质 
<br>
<br>这面倒置泪滴形的盾牌长而厚重，明显更适合骑马时使用而非步战，上面绘制有骑士的纹章，以及赞颂骑士功勋的图案，并有神职人员的祝福，可以阻挡一切攻击――无论是懦夫的箭矢、异教徒的刀剑还是巨龙的吐息。
<br>这是一面体积4，格挡4，伤害2L的风筝盾（重盾），持用此盾牌的人物在对抗远程攻击的防御上获得额外的3DP格挡加值，并在反射豁免上获得+3DP掩蔽加值。
<br>当使用其进行格挡时，人物在防御上获得+1附加成功格挡加值；主动以其作为掩蔽时，改为在反射豁免中再获得+1附加成功掩蔽加值。
