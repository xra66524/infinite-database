<br>铁浮屠 DD+1500 科技本质 
<br>
<br>这种砂钢锻造的多层铠甲为河洛所创，可以最大限度地包裹骑士的全身。一群穿着铁浮屠的武士骑在同样披挂铁浮屠铠甲的战马上，就如钢铁的洪流，足以令亡者都心生恐惧。 
<br>
<br>铁浮屠属于重甲，盔甲防御8/8，拥有【封闭2】和DR2/精金，穿戴者需承受3点盔甲减值。 
<br>
<br>购买铁浮屠时额外支付D+500奖励点，任选一种体积不超过10、可以作为坐骑的生物载具或随从，可以同时获得一套同样数据、适合该坐骑的坐骑用铁浮屠铠甲。 
<br>
<br>当你和坐骑同时穿着铁浮屠时，你在对抗将你与坐骑分离的检定时，你的对抗检定+2DP。
