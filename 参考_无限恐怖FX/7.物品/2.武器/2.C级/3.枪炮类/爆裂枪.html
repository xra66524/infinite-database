<br>爆裂枪  C+1500  科技本质
<br> 
<br>与其说是连发霰弹枪，不如说是一樽能拿在手里的霰弹火炮，绝对的沉重换来绝对的坚固，疯狂的装药量和丧心病狂的口径都在表明能用这种武器的都是纯粹的疯子。 
<br>
<br>武器伤害10L，破甲2，射程40米，双手持，力量需求8，专业：霰弹枪，具有【长点射】【连射】【无限子弹】和【爆矢】特性。自动攻击一个相邻的目标并因此承受-1DP，长点射和扫射多攻击2米范围内的目标，在对无甲目标或者被破完甲的目标时额外获得一个附加成功。
<br>
<br>特殊的，使用者的耐力值需要达到6点，才能安全的使用这把枪而不被巨大的后坐力撞断骨头，否则每攻击一次就会受到1点冲击伤害。
<br>
