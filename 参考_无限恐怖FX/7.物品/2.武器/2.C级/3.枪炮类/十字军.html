<br>十字军
<br>本质：魔幻本质
<br>价格：C+1000分
<br>分类：小型左轮手枪
<br>前提：要求智力3，敏捷3才能使用。
<br>体积：1
<br>武器基本属性：武器伤害6L，［无限弹药］，射击时所造成的伤害中一半是穿刺伤害，一半是正能量伤害，射程20米。 
<br>使用该武器的学者的智力思维速度将会被加快，虽然他依旧不擅长射击，但可计算出弹道的轨迹。
<br>
<br>使用此武器时，你能用“智力+学识+任一枪械相关专业”代替敏捷+射击：手枪“进行枪械攻击检定。该专业必须在购买时决定，之后不可更改。
