<br>长针 
<br>价格：C+2000 
<br>效果： 
<br>这是一把10L体积5的特质武器，长度接近两米，通体为黑色的大剑，拥有特性【双手】，【长武器】，【刁钻】，异种兵器【时间兵器】这是专门由迦具土为【时间兵器】所配套制作的专属兵器，没有经验的人使用起来非常困难。 
<br>特殊： 
<br>自由开启或关闭，黑色的能量刃突然暴涨，使你可以同时攻击前方五米内的扇形区域，令这次攻击作用于范围内的所有敌人，获得额外的6点破甲（如果超过则将剩余部分转换成DP）。 
<br>――
<br>因为电池质量问题导致的 装备升级和价格增长 不过好消息是 这东西可以无限用了！
<br>“长官，这样能糊弄过去吗？” “你问我？ 那我去问谁啊！”
