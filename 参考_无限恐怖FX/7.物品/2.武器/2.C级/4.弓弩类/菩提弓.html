<br>菩提弓  C+2000
<br>魔幻本质
<br>带有佛门纯洁佛力之武器，凡此弓所发射之箭，皆具有佛力，可对灵体和具有邪恶力量之物体造成伤害。
<br>这是一把武器伤害4L，具有【魔法】和【幽冥】属性的长弓，力量需求为3，基础射程为40米，可忽视4点远程攻击承受的距离减值；若射程减值已经为0，则每额外忽视的2点射程减值会转为1倍不承受射程减值的射程。在攻击时具有+2附加成功的增强加值。平时可与使用者身体结合，藏于体内。收入身体与将之拿出都是一个迅捷动作。
