<br>M500史密斯威森
<br>
<br>价格：1500分
<br>
<br>科技本质
<br>
<br>介绍：世界上威力最大的量产型手枪之一，口径.50（12.7mm），使用.500马格努姆大装量手枪弹，出枪动能达4109J，威力足以用于狩猎非洲大型野生动物。
<br>
<br>基础数据：
<br>
<br>武器伤害5L，射程35米，装弹量5发，力量需求3（双手握持）/4（单手握持），体积2
<br>
<br>特性：
<br>
<br>【大威力】：砰！
<br>在M500命中敌人后，可将所造成的其中1点伤害加深一级（B-L-A）。
<br>
<br>【强动能】：普通防弹衣在它面前形同虚设。
<br>M500额外具有2点破甲。若目标身上拥有【防弹】特性，无论是否被破甲破除，这次攻击只能造成钝击伤害。
