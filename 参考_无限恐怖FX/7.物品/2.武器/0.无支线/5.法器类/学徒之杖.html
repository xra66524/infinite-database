<br>学徒之杖
<br>介绍：
<br>       法师学徒所用的新手法杖，用它可以更安全、更稳定的引导魔法能量。
<br>价格：500点
<br>效果：
<br>       这根法杖具备正常法杖的基本能力，视作“法术武器”，可以让施法者施法骰上得到1点增强加值。
<br>       以此法杖引导法术可以施法者得到更安全、稳定的法术，法师学徒们可以以降低施法骰2dp为代价，获取1个施法骰上的附加成功，增强加值。
<br>       最后法杖也被视为一根能让学徒护身的长棍，它在数据上等于格斗兵器的长棍，额外拥有格挡1的特性。
