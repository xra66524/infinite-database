<br>除尘魔杖 100
<br>
<br>魔幻本质
<br>
<br>使用前置：任意施法者职能
<br>
<br>这是一根长约20厘米，直径约0.6厘米的木制魔杖，视作法术武器。当你持握这根魔杖时，你可以以一个标准动作立即清洁距离你3米内的一个不超过1立方米的区域，可清除其中的尘土和污垢。
<br>
<br>在购买时，你可以定制你喜好的尺寸：
<br>一根魔杖长约6到12英寸，直径约0.25英寸，重不超过1盎司，木制；
<br>
<br>或者你可以选择具有相同效果的“除尘法杖”版本：
<br>一根法杖长约4到7英尺，直径2到3英寸，重约5磅，木制。
<br>
