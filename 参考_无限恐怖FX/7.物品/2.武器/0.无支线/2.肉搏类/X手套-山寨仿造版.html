<br>X手套-山寨仿造版 特异本质
<br>500 
<br>该手套视为天生武器般使用拳专业而非拳套专业，造成钝击伤害，武器伤害3L，分类：拳套。 
<br>装备该手套后，可以以自由动作开启伪死气状态，出现火焰特效与声音，持续一场景。在伪死气状态下，以标准动作使用，使用该手套进行一次肉搏攻击，这次攻击附带3点燃烧点数（标准豁免），不可叠加。
