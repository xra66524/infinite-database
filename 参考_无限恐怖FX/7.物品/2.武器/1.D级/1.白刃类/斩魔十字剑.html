<br>斩魔十字剑
<br>价格：D+500
<br>效果：
<br>    这柄长剑的材质是银，由于太过柔软，使用它对正常生物进行攻击时，承受-2dp的惩罚。
<br>    不过对于黑暗生物的发动攻击时，它不受惩罚，且额外得到1dp正能量加值。
<br>    此剑的武器伤害和正常的长剑一致，也拥有长剑其他相关特性。
<br>    对恶魔和具备恶魔血统的邪恶生物，此剑可额外增加6L武器伤害。
<br>    对它们进行攻击时，可破除2点任意防御，视为具有〖能量武器〗特性，可附带攻击成功数的目眩异常点数（正常豁免）。
<br>    此剑最多使用9次。
