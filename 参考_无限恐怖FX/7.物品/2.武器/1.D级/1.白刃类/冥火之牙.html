<br>冥火之牙 魔幻本质
<br>DD+2000
<br>这把匕首上带着可以灼烧灵魂的蓝绿色火焰，看起来就像是地狱守门犬的门牙一样，呈现出锐利而狰狞的形象。将匕首收入鞘中时即可隐藏此火焰。
<br>这是一把武器伤害为4L的匕首，具有【魔法】和【幽冥】特性。当匕首成功命中目标时，附带1点精神伤害和5点剧痛点数（标准豁免），但这些剧痛点数不会使目标陷入重度状态。
