<br>刽子手的斩首刀 
<br>
<br>介绍： 
<br>
<br>　　这是一柄锈迹斑斑的斩首大刀，它曾在刽子手的手中夺走许多性命。 
<br>
<br>　　此刀含蓄的凶煞之气就连厉鬼也会感到畏惧。 
<br>
<br>价格：D+1500 
<br>
<br>　　这柄大刀的武器伤害为6L。 
<br>
<br>　　在用于针对特殊部位－咽喉的攻击时，它能具备特别效力。 
<br>
<br>　　以它进行攻击，可使目标在豁免特殊部位攻击的效果时失去两个成功数。 
<br>
<br>　　这柄刀上缠绕的凶煞之气，还可使它能对灵体正常造成伤害，以它造成的创伤来源效果也可正常对鬼魂生效。
<br>
