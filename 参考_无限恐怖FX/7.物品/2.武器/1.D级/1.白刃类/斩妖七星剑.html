<br>斩妖七星剑 D+1000 特异本质
<br>
<br>以雷击铁为主要材料制成的宝剑，剑身上除去嵌有7枚铜钉外，还通过激光铭刻有诸多咒文，可轻松破开僵尸的铜皮铁骨。
<br>
<br>斩妖七星剑视为一把武器伤害为3L的长剑，具有1点破甲，可对灵体正常造成伤害，并且对灵体攻击时获得2DP正能量加值。可代替桃木剑或铜钱剑等作为仙术的法器使用。
<br>
<br>破邪：当以黑暗生物作为攻击目标时，斩妖七星剑的武器伤害提高至6L，破甲提高至5点。
<br>
<br>注意，斩妖七星剑视为已进行了材质改造（雷击铁）。
