<br>玄铁剑　D+750
<br>武学本质（特异本质） 
<br>这是一把武器伤害为6L的重剑，具有破甲4、威猛2、【双手】和【玄铁】，伤害类型为挥砍或钝击。
<br>需要力量5，武技3才能无减值使用，你每比需求值低1，则攻击DP受到-2的器械减值。
<br>特殊的，玄铁剑的材质即为玄铁，无法进行材质改造。
