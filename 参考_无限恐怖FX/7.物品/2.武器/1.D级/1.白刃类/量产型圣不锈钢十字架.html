<br>量产型圣不锈钢十字架
<br>D+500
<br>“我曾经以为，我可以让它生锈，可是我错了，他们居然用了不锈钢”
<br>―by 某不愿意透露姓名生锈果实能力者
<br>这是一柄体积4，伤害为7L，外观如同十字架的双手战锤，上面刻有兔子神教的兔头log，持有者可以让攻击DP-6，并获得2个附加成功，这属于器械加值；
<br>【圣银镀膜】教会因为圣银库存不足而演化出来的过渡产品，表面有镀上一层圣银的膜，让其有攻击灵体的能力（非幽冥特性）
<br>【圣兔祝福】“啊，至高无上的兔兔啊，请你照亮黑暗，为我指明前进的道路吧”圣兔祝福了这柄十字架，现在十字架为持有者提供了黑暗视觉，并且因为祝福的关系，十字架视为拥有魔法特性
