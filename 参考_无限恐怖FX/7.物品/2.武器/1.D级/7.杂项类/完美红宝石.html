<br>完美红宝石 D+500 
<br>大自然所能形成的最纯粹的红宝石，经过仔细雕琢后。在任何与地球有相近习俗、审美的地方，这快宝石都属于价值连成，佩带后可以在进行社交检定时额外获得+2DP增强加值。 
<br>除此之外，完美红宝石还能聚焦太阳光。整轮动作使用，聚焦阳光进行一次攻击，此时完美红宝石的数据等同于“高能粒子脉冲手枪”（包括武器伤害、射程、特性等，受防弹影响），因为不是正规武器，攻击-1DP，只能进行单发射击，所用专业为“完美红宝石”。阳光外的人造光源伤害很低，只能点燃易燃物。
