<br>“萤火众生”系列血统
<br>
<br>星海之中，暗影在一刻不息地流动着，试图将智慧生命所创造的辉煌从根源抹去，复归为零。它们说道，生灵即窃取者，而无止尽的静谧与死亡才是永恒。
<br>生命并不屈服。即使自身的存在，只是亿亿分之一的奇迹所酿造出来的“偶然”也罢，即使自己相较于暗影过于渺小脆弱也罢。他们拼搏着怒吼着，互相维系着也彼此争夺着，在冷酷的苍天面前，宣言自身的自由。
<br>本系列血统，旨在提升FX规则中血统的稀薄存在感（大概做不到），书写笔者心目中奇妙的大千世界设定（没什么卵用），以及，提供几个适合污资源黑科技的逗比思路（好吧这个才是主题）。
