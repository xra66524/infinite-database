<br>魔力（魔法力）
<br>
<br>关键属性：智力+感知。
<br>通用的或未说明的魔法力池，需要以梦境来回复。四个小时睡眠可以完全回复魔力池，回复量会平均到睡眠的每一分钟（一个拥有六十点魔力的角色，他睡半个小时就能够回复7点魔力）。人物每天通过睡眠最多回复相当于魔力池的魔力。或者你可以靠冥想恢复魔力，你可以花费一小时做一个感知+智力的判定，恢复等于成功数的魔力。每日以冥想恢复的魔力不可超过魔力池上限。 
<br>
<br>可选规则：任何使人无法做梦的效果都会阻碍魔力的回复。在这种效果下，入睡的人需要进行一个DC5的感知判定，通过则可以正常回复魔力，这是一个延长判定，周期为小时。冥想恢复的魔力减半。
