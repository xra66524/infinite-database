<br>一阳指（火枪）　　
<br>特殊招式
<br>价格：D+1000
<br>
<br>描述：你把一支体积3以下的手枪藏入袖子。使用本技艺时，你必须用任意方法发出假装发功时的回音，暗中却使用枪械一举击倒对方。
<br>
<br>效果：消耗一个标准动作，本次攻击判定改为以智力+社交：唬骗代替敏捷+射击：手枪进行射击。你同样享受枪械带来的高速优势。伤害类型视枪或弹药的特性而定。
<br>
<br>如果出招时喊出“能死在我一阳指之下，也算是你的福气了！”，判定伤害+1DP，这是个表现加值。
<br>
<br>其他人可以看破你的把戏，使用调查检定对抗你的唬骗检定。如果对方没有看穿你的把戏，你将被视为武林高手，效果持续一个场景。
