<br>缩地成寸 C+1000
<br>
<br>前置：拥有真气池
<br>
<br>
<br>“房有神术，能缩地脉，千里存在，目前宛然，放之复舒如旧也。”――《神仙传》
<br>
<br>以一个迅捷动作，念出以上口诀，便可以从缩地和成寸两个术法中选择其一生效，持续一场景。如果你的仙术专业达到5级，你可以同时获得这两个术法的效果。
<br>
<br>缩地：你可以立即遁入脚下的、硬度不高于2的地面，这视作你获得速度等同于基础移动速度的遁地能力。
<br>
<br>成寸：你将自己的体积变为1，这不会影响你除了触及以外的数据，并且你在防御上额外获得+3DP的闪避加值。
<br>
<br>
<br>――“缩地成寸本是空间系的高深术法，此人今日竟能从中习得两个术法，天赋真是出类拔萃!”
<br>
