<br>分水峨眉刺 50
<br>
<br>峨眉刺刺身正中有一小孔，上铆一铁钉，钉子可在孔中灵活转动，钉下有一铁环与之相连。兵器身形娇小，适合水中作战，可在水中作刺杀或潜入水底凿穿船底之用，传说武者能在水下靠旋转拨水前进。
<br>
<br>当你双手各持一把峨眉刺时，通过不停旋转手中的峨眉刺，你的游泳速度+2米。
