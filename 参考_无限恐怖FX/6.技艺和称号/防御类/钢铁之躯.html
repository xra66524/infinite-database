<br>钢铁之躯 
<br>介绍： 
<br>或是源于仙丹、灵药，或是来源于神性的火焰和冥河之水的浸泡，在各种神话传说中都提及了将凡人肉身转换为钢铁之躯的故事。 
<br>价格：BB+6000 
<br>效果： 
<br>你的天生防御额外提高了5点，且能够额外忽略共计12点破甲值。
<br>基于这种防御，你还额外得到5点全伤害吸收。 
<br>除此之外，身为钢铁，你可以获得犹如你最高强化支线的创伤免疫。
<br>
<br>变体： 
<br>若不提升属性，则可将这种技艺以CC+4500的价格购买，但获得的天生防御和全伤害吸收减少1点
