<br>初级生命强化　D+500
<br>强化初级生命强化的人物生命值上限+1，并且人物的自然恢复速度+1倍。
<br>
<br>次级生命强化　C+1000
<br>前置：初级生命强化
<br>强化次级生命强化的人物生命值上限再+3，并且人物的自然恢复速度再+1倍。
<br>
<br>中级生命强化　B+2000
<br>前置：次级生命强化
<br>强化中级生命强化的人物生命值上限再+7，并且人物的自然恢复速度再+1倍。
<br>
<br>高级生命强化　A+4000
<br>前置：中级生命强化
<br>强化高级生命强化的人物生命值上限再+15，并且人物的自然恢复速度再+1倍。
