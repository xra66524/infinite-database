<br>爱无限D+500
<br>
<br>“晚上好，各位。
<br>刚刚这里好像有「寿命论」的气息啊
<br>（他妈的，真是被看扁了）
<br>
<br>爱的力量，是无限的！”
<br>
<br>
<br>传承自超筋肉金发小（？）女孩的祝福，使用时全身会喷涌出大量的斗气，在场人员中看过《Dragon ball》的会将你认错成超级赛●人。
<br>
<br>只能对种族寿命上限差距超过100岁以上的情侣才能够使用，你的惊天斗气将冲散他们之间的物种隔阂，将双方的寿命取高并统一（或者取低――如果他们自愿的话），只要两者之间仍然相爱，这份祝福就不会消散。这是一个影响心灵来源的BB级免疫衰老效果。
