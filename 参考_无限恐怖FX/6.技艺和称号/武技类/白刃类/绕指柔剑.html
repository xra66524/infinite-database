<br>绕指柔剑 
<br>介绍：
<br>    为武当派剑法之一，乃张三丰自创，共有七十二路。
<br>    使出时全仗以浑厚内力逼弯剑刃，使其如软带般轻柔曲折、飘忽不定，显得剑招变幻无常，令敌人无从挡架。
<br>价格：DD+1500
<br>前提：C级内力
<br>效果：
<br>　　你可以用自身内力逼弯剑刃，使其软带般轻柔曲折、飘忽不定。
<br>    支付1点内力，效果持续1轮，你持有的长剑可视为软剑，额外获得软剑武器分类和刁钻特性。
<br>　　你依旧可以使用剑专业，而非软剑专业使用获得了软剑分类的长剑进行白刃攻击判定。并且即使你没有具备软剑专业也不会因此受到异种武器减值。
<br>　　在效果持续时间内，每轮一次，你可以自由动作使用一次虚招，不过虚招造成的措手不及等级将提升到C级。
