<P>
改造的力量源于形体外在或内在的转化，与血统类似，一旦接受某种改造，个人的天赋与努力对其基本特性没有太大影响。作为人物的主要模版之一，改造通常为提供特殊能力的资源大类。 </P>
<P>一般改造价格：
<br>没有特别标注的改造，一般价格为：
<br>D级改造：D+600
<br>C级改造：C+1200
<br>B级改造：B+2400
<br>A级改造：A+4800
<br>S级改造：S+9600 </P>
